<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2FrqmGzGkClQlYkUZhF9vPwEfrl9S1XGGFnVGiir6_A&s=10" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Productivity Dashboard 🚀💻</title>
</head>
<body>
    <div class="main">
    <section class="allElem">
        <header>
            <div class="header1">
                <h2>Delhi </h2>
                
                <h1>Thursday, 4:00 pm</h1>
                <h3 class="city">Loading... </h3>
                
            </div>
            <div class="header2">
                <h2>20 °C</h2>
                <h3 class="precipitation">Precipitation: 3%</h3>
                <h3 class="humidity">Humidity: 39%</h3>
                <h3 class="wind">Wind: 8 km/h</h3>
            <h4>Mostly sunny</h4>
            </div>
        </header>
       <div class="allfeatures">
         <div class="to-do elem" id="0">
            <img src="https://images.unsplash.com/photo-1712000155290-ee65c0a82eda?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>to do list</h2>
        </div>
        <div class="planner elem" id="1">
            <img src="https://images.unsplash.com/photo-1531403009284-440f080d1e12?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>daily planner</h2>
        </div>
        <div class="motivation elem" id="2">
            <img src="https://images.unsplash.com/photo-1528716321680-815a8cdb8cbe?q=80&w=776&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>motivation</h2>
        </div>
        <div class="pomodoro elem " id="3">
            <img src="https://images.unsplash.com/photo-1501139083538-0139583c060f?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="">
            <h2>pomodoro timer</h2>
        </div>
       </div>
        
    </section>
    <section class="fullElem todo-list-fullpage" id="0">
            <h2>your personalised Task list</h2>
             <button class="bckbtn" id="0">close</button>
            <div class="todo-container">
                <div class="add-task">
                    <form >
                        <input type="text" placeholder="enter your task">
                        <textarea name="" id="" placeholder="enter details"></textarea>
                        <button type="submit">Add task</button>
                    </form>
                </div>
                <div class="alltask">
                 
                </div>
            </div>
           
        </section>    
        <section class="fullElem daily-planer-fullpage" id="1">
            <button class="bckbtn" id="1">close</button>
            <h1>Daily planner</h1>
            <div class="day-planner">
                
            </div>
        </section>
        <section class="fullElem Motivation-fullpage" id="2">
            <div class="motivation-container">
                <div class="motivation-wraper">
                    <div class="motivation-1">
                        <h2>Quote of the Day </h2>
                    </div>
                    <div class="motivation-2">
                        <h1></h1>
                    </div>
                    <div class="motivation-3">
                        <h2></h2>
                    </div>
                </div>
            </div>
            <button class="bckbtn" id="2">close</button>
        </section>
        <section class="fullElem pomodoro-timer-fullpage" id="3">
            <h1>Study With Me</h1>
            <div class="session">
                    <h4>Work session</h4>
                </div>
            <div class="pomo-timer">
                <h1>25:00</h1>
            <button class="start-btn">Start</button>
            <button class="pause-btn">Pause</button>
            <button class="reset-btn">Reset</button>
            </div>
            <button class="bckbtn" id="3">close</button>
        </section>
        
    </div>
    <script src="main.js"></script>
</body>
</html>
